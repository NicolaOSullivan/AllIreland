<!DOCTYPE html>
<html>
<head>
    <title>Enter Your Name</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 400px; width: 100%; padding: 20px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 30px; }
        .emoji { font-size: 4rem; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 15px 20px; font-size: 1.2rem; border: none; border-radius: 50px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.5); }
        input[type="text"]:focus { outline: none; background: rgba(255,255,255,0.15); }
        .btn { display: inline-block; padding: 15px 40px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .error { background: rgba(255,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        a { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👋</div>
        <h1>What's your name?</h1>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="name" placeholder="Enter your name" required autofocus>
            <button type="submit" class="btn">Join Game</button>
        </form>
        
        <p style="margin-top: 20px;"><a href="/">← Back</a></p>
    </div>
</body>
</html>
