<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 400px; width: 100%; padding: 20px; text-align: center; }
        h1 { font-size: 1.8rem; margin-bottom: 30px; }
        input[type="password"] { width: 100%; padding: 15px 20px; font-size: 1.1rem; border: none; border-radius: 50px; background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 20px; }
        input[type="password"]:focus { outline: none; background: rgba(255,255,255,0.15); }
        .btn { display: block; width: 100%; padding: 15px; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .error { background: rgba(255,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Admin Login</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Enter admin password" required>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
</body>
</html>
