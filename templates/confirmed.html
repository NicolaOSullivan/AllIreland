<!DOCTYPE html>
<html>
<head>
    <title>Predictions Submitted!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; padding: 20px; text-align: center; }
        .emoji { font-size: 5rem; margin-bottom: 20px; }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: #a0a0a0; margin-bottom: 30px; }
        .picks-summary { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; text-align: left; margin-bottom: 30px; }
        .pick-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .pick-item:last-child { border-bottom: none; }
        .pick-winner { color: #667eea; font-weight: 600; }
        .btn { display: inline-block; padding: 15px 40px; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; text-decoration: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">✅</div>
        <h1>You're In!</h1>
        <p class="subtitle">Good luck, {{ name }}!</p>
        
        <div class="picks-summary">
            <h3 style="margin-bottom: 15px;">Your Picks</h3>
            {% for match in matches %}
            <div class="pick-item">
                <span>{{ match.home }} vs {{ match.away }}</span>
                <span class="pick-winner">{{ picks.get(match.id|string, '?') }}</span>
            </div>
            {% endfor %}
        </div>
        
        <a href="/leaderboard" class="btn">View Leaderboard</a>
    </div>
</body>
</html>
